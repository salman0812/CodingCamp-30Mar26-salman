<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">

    <div class="balance-card">
      <p>Total Balance</p>
      <h1 id="total-balance">Rp 0</h1>
    </div>

    <div class="form-card">
      <h3>Add Transaction</h3>
      <label>Item Name</label>
      <input type="text" id="item-name" placeholder="e.g. Coffee" />
      <label>Amount</label>
      <input type="number" id="item-amount" placeholder="e.g. 15000" />
      <label>Category</label>
      <select id="item-category">
        <option value="">-- Select Category --</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Fun">Fun</option>
      </select>
      <div class="custom-category-row">
        <input type="text" id="custom-category-input" placeholder="New category name" />
        <button id="add-category-btn">+ Add</button>
      </div>
      <label>Spending Limit (optional)</label>
      <input type="number" id="spending-limit" placeholder="e.g. 100000" />
      <button id="add-btn">Add Transaction</button>
    </div>

    <div class="bottom-row">
      <div class="list-card">
        <h3>Transactions</h3>
        <div class="sort-row">
          <label>Sort by:</label>
          <select id="sort-select">
            <option value="default">Default</option>
            <option value="amount-asc">Amount ↑</option>
            <option value="amount-desc">Amount ↓</option>
            <option value="category">Category</option>
          </select>
        </div>
        <ul id="transaction-list"></ul>
      </div>
      <div class="chart-card">
        <h3>Spending by Category</h3>
        <canvas id="expense-chart"></canvas>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
